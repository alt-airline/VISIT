<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Визитка Тагира</title>
  <style>
    @keyframes gradientAnimation {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(-45deg, #0d1b2a, #1b263b, #3e4c6d, #5a5470);
      background-size: 400% 400%;
      animation: gradientAnimation 15s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      box-sizing: border-box;
      min-height: 100vh;
    }

    .liquid-glass {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      color: #fff;
      text-align: center;
      user-select: none;
      transition: box-shadow 0.3s ease, background 0.3s ease;
    }

    .liquid-glass:hover {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 12px 40px rgba(255, 255, 255, 0.6);
    }

    header.banner {
      max-width: 400px;
      width: 100%;
      padding: 2.5rem 2rem;
      margin-bottom: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    header.banner:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px 4px rgba(255, 255, 255, 0.6);
    }

    header.banner h1 {
      font-size: 2.75rem;
      font-weight: 900;
      margin: 0 0 0.3rem 0;
      letter-spacing: 1.2px;
    }

    header.banner p {
      font-size: 1.25rem;
      font-weight: 500;
      margin: 0;
      opacity: 0.85;
    }

    section.contacts {
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .contact-button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
      transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      text-decoration: none;
    }

    .contact-button:hover,
    .contact-button:focus {
      background: rgba(255, 255, 255, 0.45);
      box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.7);
      transform: scale(1.05);
      outline: none;
    }

    section.skills {
      max-width: 400px;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .skill-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 1.5rem 1rem;
      color: #fff;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-weight: 700;
      font-size: 1.25rem;
      user-select: none;
      transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      cursor: default;
    }

    .skill-card:hover {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 12px 40px rgba(255, 255, 255, 0.6);
      transform: translateY(-8px);
    }

    .skill-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      user-select: none;
    }

    @media (max-width: 480px) {
      section.skills {
        grid-template-columns: 1fr;
      }
      header.banner h1 {
        font-size: 2rem;
      }
      header.banner p {
        font-size: 1rem;
      }
      .contact-button {
        font-size: 1rem;
        padding: 0.65rem 1.25rem;
      }
      .skill-card {
        font-size: 1.1rem;
        padding: 1.25rem 1rem;
      }
      .skill-icon {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>

  <header class="banner liquid-glass">
    <h1>👨‍💻</h1>
    <p>Все еще жив (извините)</p>
  </header>

  <section class="contacts">
    <a href="mailto:luminicci@mail.ru" class="contact-button" aria-label="Email">✉️ luminicci@mail.ru</a>
    <a href="tel:+79889093102" class="contact-button" aria-label="Телефон">📞 +7 988 909 31 02</a>
    <a href="https://instagram.com/luminicci" target="_blank" rel="noopener noreferrer" class="contact-button" aria-label="Instagram">📸 Instagram</a>
    <a href="https://t.me/antalvalaeza" target="_blank" rel="noopener noreferrer" class="contact-button" aria-label="Telegram">💬 Telegram</a>
  </section>

  <section class="skills">
    <div class="skill-card liquid-glass">
      <div class="skill-icon" aria-hidden="true">🌐</div>
      HTML
    </div>
    <div class="skill-card liquid-glass">
      <div class="skill-icon" aria-hidden="true">🎨</div>
      CSS
    </div>
    <div class="skill-card liquid-glass">
      <div class="skill-icon" aria-hidden="true">⚙️</div>
      JavaScript
    </div>
    <div class="skill-card liquid-glass">
      <div class="skill-icon" aria-hidden="true">⚛️</div>
      React
    </div>
  </section>

</body>
</html>
